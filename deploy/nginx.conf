# Example nginx site config for hosting the app at:
#   http://dataviz.boerland.com/spotify26/
#
# Copy to /etc/nginx/sites-available/dataviz.boerland.com (or /etc/nginx/conf.d/)
# and reload: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name dataviz.boerland.com;

    root /var/www/dataviz.boerland.com;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # The app is served under /spotify26/
    location /spotify26/ {
        alias /var/www/dataviz.boerland.com/spotify26/;
        try_files $uri $uri/ /spotify26/index.html;

        # Long cache for fingerprinted assets
        location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico|json)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Optional: redirect /spotify26 → /spotify26/ (avoids broken relative paths)
    location = /spotify26 {
        return 301 /spotify26/;
    }
}
